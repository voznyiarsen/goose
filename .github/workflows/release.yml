name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-version.outputs.tag }}
    steps:
      - id: set-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  build-x86_64:
    name: Build x86_64 Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-unknown-linux-gnu
      - name: Build
        run: cargo build --release -p goose-cli --bin goose
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: goose-x86_64-unknown-linux-gnu
          path: target/release/goose

  build-aarch64:
    name: Build aarch64 Linux
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-unknown-linux-gnu
      - name: Build
        run: cargo build --release -p goose-cli --bin goose
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: goose-aarch64-unknown-linux-gnu
          path: target/release/goose

  build-android:
    name: Build aarch64 Android
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-linux-android
      - name: Build
        run: |
          export CC_aarch64_linux_android="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          export CXX_aarch64_linux_android="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++"
          export AR_aarch64_linux_android="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${CC_aarch64_linux_android}"
          export CFLAGS_aarch64_linux_android="-Dindex=strchr -D__USE_MISC"
          cargo build --release --target aarch64-linux-android -p goose-cli --bin goose \
            --no-default-features \
            --features tui,aws-providers,telemetry,otel,rustls-tls,update
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: goose-aarch64-linux-android
          path: target/aarch64-linux-android/release/goose

  release:
    name: Create Release
    needs: [version, build-x86_64, build-aarch64, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: List artifacts
        run: ls -lh
      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          artifacts: goose-*
          allowUpdates: true
          omitBody: true
          omitPrereleaseDuringUpdate: true
